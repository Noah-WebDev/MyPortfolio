<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fryzjer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Poppins
        }
    </style>
</head>

<body class="bg-black text-white">

    <header class="flex justify-between p-6">
        <h1 class="font-bold text-xl">Blask Fryzury</h1>
        <nav class="space-x-6">
            <a href="#">Usługi</a>
            <a href="#">Cennik</a>
            <a href="#">Kontakt</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="h-screen flex items-center justify-center text-center"
        style="background:url('https://images.unsplash.com/photo-1621605815971-fbc98d665033') center/cover">
        <div class="bg-black/60 p-10 rounded-xl">
            <h2 class="text-4xl mb-4">Klasyka i styl</h2>
            <p>Profesjonalne strzyżenie i pielęgnacja brody</p>
            <button onclick="book()" class="mt-4 bg-white text-black px-6 py-3 rounded-full">Umów wizytę</button>
        </div>
    </section>

    <!-- PRICING -->
    <section class="p-10 grid md:grid-cols-3 gap-6">
        <div class="bg-gray-900 p-6 rounded text-center">
            <h3 class="text-xl mb-2">Strzyżenie</h3>
            <p class="text-gray-400">Profesjonalne cięcie dopasowane do stylu</p>
            <p class="mt-3 font-bold">60 zł</p>
        </div>

        <div class="bg-gray-900 p-6 rounded text-center">
            <h3 class="text-xl mb-2">Broda</h3>
            <p class="text-gray-400">Modelowanie i pielęgnacja brody</p>
            <p class="mt-3 font-bold">40 zł</p>
        </div>

        <div class="bg-gray-900 p-6 rounded text-center">
            <h3 class="text-xl mb-2">Pakiet Premium</h3>
            <p class="text-gray-400">Strzyżenie + broda + stylizacja</p>
            <p class="mt-3 font-bold">90 zł</p>
        </div>
    </section>

    <!-- GALLERY -->
    <section class="p-10 text-center">
        <h2 class="text-3xl mb-6">Galeria</h2>
        <div class="grid md:grid-cols-3 gap-4">
            <img class="rounded" src="https://images.unsplash.com/photo-1512690459411-b9245aed614b">
            <img class="rounded" src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
            <img class="rounded" src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a">
        </div>
    </section>

    <script>
        function book() {
            alert("Rezerwacja wkrótce!");
        }
    </script>

</body>

</html>
